<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="./Sign_up.css">
</head>
<body>
    <div class="container-signup">
        <form class="form-signup">
            <div class="label-name"><label >Name</label></div>
            <div class="name-wrapper">
               <div class="line"> 
            <input type="text">
             <span>First Name</span></div>
             <div class="line">
             <input type="text">
             <span>Last Name</span></div>
            </div>

            <label >Phone</label>
            <div class="name-wrapper">
            <div class="line">
             <input type="text" class="short">
             <span>Code</span></div>
             <div class="line" >
             <input type="tel" placeholder="(123)-456-789" class="long">
             <span>Number</span></div>
             </div>
            <label >Email*</label>
             <input type="email" required>
            <label>Gender</label>
            <div class="radio-input">
            <input type="radio" name="radio">Male
            <input type="radio" name="radio">Female
            <input type="radio" name="radio">Other
            </div>





        </form>

    </div>
</body>
</html>
